<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>灵兽迷踪 - 图片检查</title>
    <style>
      body { max-width: 920px; margin: 0 auto; padding: 24px; color: #173c3e; font-family: "Microsoft YaHei", sans-serif; background: #edf3ec; }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { color: #557668; }
      #summary { padding: 12px; border-radius: 6px; color: #fff; background: #1b5253; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-top: 18px; }
      .item { padding: 8px; border: 1px solid #c7d7ca; border-radius: 6px; background: #fff; }
      .item.bad { border-color: #c96a5a; background: #fff0ed; }
      img { display: block; width: 100%; aspect-ratio: 1; object-fit: cover; background: #dbe7dc; }
      small { display: block; margin-top: 7px; overflow-wrap: anywhere; font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>灵兽迷踪图片检查</h1>
    <p>绿色代表图片已上传；红色代表该文件没有上传成功或文件名不一致。</p>
    <div id="summary">正在检查图片...</div>
    <div class="grid" id="grid"></div>
    <script>
      const files = [
        "home-mountain-gate.jpg", "game-board.jpg", "card-back.jpg", "mechanism-fog.jpg",
        "mechanism-seal.jpg", "mechanism-teleport.jpg", "mechanism-disguise.jpg", "tool-insight-mirror.jpg",
        "beast-fox.jpg", "beast-crimson-bird.jpg", "beast-turtle.jpg", "beast-ape.jpg", "beast-koi.jpg",
        "beast-deer.jpg", "beast-moon-cat.jpg", "beast-crane.jpg", "beast-rabbit.jpg", "beast-dream-butterfly.jpg",
        "beast-moon-moth.jpg", "beast-night-owl.jpg", "beast-otter.jpg", "beast-serpent.jpg", "beast-cloud-ram.jpg",
        "beast-heavenly-horse.jpg", "beast-hound.jpg", "beast-dragon.jpg", "board-stone-node.jpg",
        "tool-tracker-incense.jpg", "tool-breaker-talisman.jpg", "result-clear-bg.jpg"
      ];
      const grid = document.querySelector("#grid");
      let loaded = 0;
      let failed = 0;
      const update = () => { document.querySelector("#summary").textContent = failed ? `已加载 ${loaded} 张，缺失 ${failed} 张` : `全部 ${loaded} 张图片已成功加载`; };
      files.forEach((file) => {
        const item = document.createElement("div");
        item.className = "item";
        const image = new Image();
        image.alt = file;
        image.onload = () => { loaded += 1; update(); };
        image.onerror = () => { failed += 1; item.classList.add("bad"); update(); };
        image.src = `assets/${file}`;
        const label = document.createElement("small");
        label.textContent = file;
        item.append(image, label);
        grid.append(item);
      });
    </script>
  </body>
</html>
